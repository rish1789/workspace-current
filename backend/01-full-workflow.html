<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Workflow: User Registration to Card Management</title>
<style>
  body { font-family: sans-serif; background: #fff; padding: 24px; }
  h2 { font-size: 18px; font-weight: 500; margin-bottom: 16px; color: #1a1a1a; }
  svg text { font-family: sans-serif; fill: #333; }
  .ts { font-size: 12px; }
  .th { font-size: 14px; font-weight: 500; }
</style>
</head>
<body>
<h2>01 — Full Workflow: User Registration → Workspace → Board → Lane → Card</h2>
<svg width="100%" viewBox="0 0 680 1600" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Participants -->
<rect x="20" y="20" width="72" height="34" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="56" y="37" text-anchor="middle" dominant-baseline="central">Client</text>

<rect x="138" y="20" width="88" height="34" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="182" y="37" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Controller</text>

<rect x="278" y="20" width="80" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="318" y="37" text-anchor="middle" dominant-baseline="central" fill="#085041">Service</text>

<rect x="408" y="20" width="88" height="34" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="452" y="37" text-anchor="middle" dominant-baseline="central" fill="#712B13">Repository</text>

<rect x="546" y="20" width="100" height="34" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="596" y="37" text-anchor="middle" dominant-baseline="central" fill="#0C447C">PostgreSQL</text>

<!-- Lifelines -->
<line x1="56"  y1="54" x2="56"  y2="1580" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="182" y1="54" x2="182" y2="1580" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="318" y1="54" x2="318" y2="1580" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="452" y1="54" x2="452" y2="1580" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="596" y1="54" x2="596" y2="1580" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- USER REGISTRATION -->
<rect x="100" y="72" width="480" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text class="ts" x="340" y="82" text-anchor="middle" dominant-baseline="central" fill="#555">User Registration</text>

<text class="ts" x="116" y="108" text-anchor="middle" fill="#333">POST /api/users</text>
<line x1="56" y1="116" x2="176" y2="116" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="144" text-anchor="middle" fill="#333">createUser()</text>
<line x1="182" y1="152" x2="312" y2="152" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="180" text-anchor="middle" fill="#333">userRepo.save()</text>
<line x1="318" y1="188" x2="446" y2="188" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="216" text-anchor="middle" fill="#333">INSERT INTO users</text>
<line x1="452" y1="224" x2="590" y2="224" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="252" text-anchor="middle" fill="#333">User (id=1)</text>
<line x1="590" y1="260" x2="458" y2="260" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="116" y="288" text-anchor="middle" fill="#333">201 Created</text>
<line x1="176" y1="296" x2="62" y2="296" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- CREATE WORKSPACE -->
<rect x="100" y="322" width="480" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text class="ts" x="340" y="332" text-anchor="middle" dominant-baseline="central" fill="#555">Create Workspace</text>

<text class="ts" x="116" y="360" text-anchor="middle" fill="#333">POST /api/workspaces</text>
<line x1="56" y1="368" x2="176" y2="368" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="396" text-anchor="middle" fill="#333">createWorkspace()</text>
<line x1="182" y1="404" x2="312" y2="404" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="432" text-anchor="middle" fill="#333">findById(userId)</text>
<line x1="318" y1="440" x2="446" y2="440" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="468" text-anchor="middle" fill="#333">SELECT FROM users</text>
<line x1="452" y1="476" x2="590" y2="476" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="504" text-anchor="middle" fill="#333">User</text>
<line x1="590" y1="512" x2="458" y2="512" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="540" text-anchor="middle" fill="#333">workspaceRepo.save()</text>
<line x1="318" y1="548" x2="446" y2="548" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="576" text-anchor="middle" fill="#333">INSERT INTO workspaces</text>
<line x1="452" y1="584" x2="590" y2="584" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="612" text-anchor="middle" fill="#333">Workspace (id=1)</text>
<line x1="590" y1="620" x2="458" y2="620" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="648" text-anchor="middle" fill="#333">memberRepo.save(ADMIN)</text>
<line x1="318" y1="656" x2="446" y2="656" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="684" text-anchor="middle" fill="#333">INSERT workspace_members</text>
<line x1="452" y1="692" x2="590" y2="692" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="326" y="702" width="198" height="18" rx="3" fill="#fffbe6" stroke="#ddd" stroke-width="0.5"/>
<text class="ts" x="424" y="711" text-anchor="middle" dominant-baseline="central" fill="#555">Creator auto-added as ADMIN</text>

<text class="ts" x="116" y="736" text-anchor="middle" fill="#333">201 Created</text>
<line x1="176" y1="744" x2="62" y2="744" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- CREATE BOARD -->
<rect x="100" y="770" width="480" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text class="ts" x="340" y="780" text-anchor="middle" dominant-baseline="central" fill="#555">Create Board</text>

<text class="ts" x="116" y="808" text-anchor="middle" fill="#333">POST /api/boards</text>
<line x1="56" y1="816" x2="176" y2="816" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="844" text-anchor="middle" fill="#333">createBoard()</text>
<line x1="182" y1="852" x2="312" y2="852" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="880" text-anchor="middle" fill="#333">boardRepo.save()</text>
<line x1="318" y1="888" x2="446" y2="888" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="916" text-anchor="middle" fill="#333">INSERT INTO boards</text>
<line x1="452" y1="924" x2="590" y2="924" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="952" text-anchor="middle" fill="#333">Board (id=1)</text>
<line x1="590" y1="960" x2="458" y2="960" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="988" text-anchor="middle" fill="#333">boardMemberRepo.save(ADMIN)</text>
<line x1="318" y1="996" x2="446" y2="996" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="1024" text-anchor="middle" fill="#333">INSERT board_members</text>
<line x1="452" y1="1032" x2="590" y2="1032" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="116" y="1060" text-anchor="middle" fill="#333">201 Created</text>
<line x1="176" y1="1068" x2="62" y2="1068" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- CREATE LANE -->
<rect x="100" y="1094" width="480" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text class="ts" x="340" y="1104" text-anchor="middle" dominant-baseline="central" fill="#555">Create Lane</text>

<text class="ts" x="116" y="1132" text-anchor="middle" fill="#333">POST /api/lanes</text>
<line x1="56" y1="1140" x2="176" y2="1140" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="1168" text-anchor="middle" fill="#333">createLane()</text>
<line x1="182" y1="1176" x2="312" y2="1176" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="1204" text-anchor="middle" fill="#333">laneRepo.save()</text>
<line x1="318" y1="1212" x2="446" y2="1212" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="1240" text-anchor="middle" fill="#333">INSERT INTO lanes</text>
<line x1="452" y1="1248" x2="590" y2="1248" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="1276" text-anchor="middle" fill="#333">Lane (id=1)</text>
<line x1="590" y1="1284" x2="458" y2="1284" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="116" y="1312" text-anchor="middle" fill="#333">201 Created</text>
<line x1="176" y1="1320" x2="62" y2="1320" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- CREATE CARD -->
<rect x="100" y="1346" width="480" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text class="ts" x="340" y="1356" text-anchor="middle" dominant-baseline="central" fill="#555">Create Card</text>

<text class="ts" x="116" y="1384" text-anchor="middle" fill="#333">POST /api/cards</text>
<line x1="56" y1="1392" x2="176" y2="1392" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="1420" text-anchor="middle" fill="#333">createCard()</text>
<line x1="182" y1="1428" x2="312" y2="1428" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="1456" text-anchor="middle" fill="#333">cardRepo.save()</text>
<line x1="318" y1="1464" x2="446" y2="1464" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="1492" text-anchor="middle" fill="#333">INSERT INTO cards</text>
<line x1="452" y1="1500" x2="590" y2="1500" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="1528" text-anchor="middle" fill="#333">Card (id=1)</text>
<line x1="590" y1="1536" x2="458" y2="1536" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<path d="M318 1552 Q358 1552 358 1564 Q358 1576 318 1576" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="366" y="1564" text-anchor="start" fill="#333">generateTicketId() → TKT-0001</text>

<text class="ts" x="116" y="1592" text-anchor="middle" fill="#333">201 Created</text>
<line x1="176" y1="1598" x2="62" y2="1598" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
</svg>
</body>
</html>
