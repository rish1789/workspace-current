<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Membership, Labels & Error Flows</title>
<style>
  body { font-family: sans-serif; background: #fff; padding: 24px; }
  h2 { font-size: 18px; font-weight: 500; margin-bottom: 16px; color: #1a1a1a; }
  svg text { font-family: sans-serif; fill: #333; }
  .ts { font-size: 12px; }
  .th { font-size: 14px; font-weight: 500; }
</style>
</head>
<body>
<h2>02 — Membership, Labels & Error Flows</h2>
<svg width="100%" viewBox="0 0 680 1480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Participants -->
<rect x="20" y="20" width="72" height="34" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="56" y="37" text-anchor="middle" dominant-baseline="central">Client</text>
<rect x="138" y="20" width="88" height="34" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="182" y="37" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Controller</text>
<rect x="278" y="20" width="80" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="318" y="37" text-anchor="middle" dominant-baseline="central" fill="#085041">Service</text>
<rect x="408" y="20" width="88" height="34" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="452" y="37" text-anchor="middle" dominant-baseline="central" fill="#712B13">Repository</text>
<rect x="546" y="20" width="100" height="34" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="596" y="37" text-anchor="middle" dominant-baseline="central" fill="#0C447C">PostgreSQL</text>

<!-- Lifelines -->
<line x1="56"  y1="54" x2="56"  y2="1460" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="182" y1="54" x2="182" y2="1460" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="318" y1="54" x2="318" y2="1460" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="452" y1="54" x2="452" y2="1460" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="596" y1="54" x2="596" y2="1460" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- ADD WORKSPACE MEMBER -->
<rect x="100" y="72" width="480" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text class="ts" x="340" y="82" text-anchor="middle" dominant-baseline="central" fill="#555">Add Workspace Member</text>

<text class="ts" x="116" y="108" text-anchor="middle" fill="#333">POST /api/workspaces/1/members</text>
<line x1="56" y1="116" x2="176" y2="116" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="144" text-anchor="middle" fill="#333">addMember(1, 2, MEMBER)</text>
<line x1="182" y1="152" x2="312" y2="152" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="180" text-anchor="middle" fill="#333">existsByWorkspaceAndUser()</text>
<line x1="318" y1="188" x2="446" y2="188" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="216" text-anchor="middle" fill="#333">SELECT EXISTS(...)</text>
<line x1="452" y1="224" x2="590" y2="224" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="252" text-anchor="middle" fill="#333">false (not a member)</text>
<line x1="590" y1="260" x2="458" y2="260" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="288" text-anchor="middle" fill="#333">memberRepo.save(WorkspaceMember)</text>
<line x1="318" y1="296" x2="446" y2="296" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="324" text-anchor="middle" fill="#333">INSERT workspace_members</text>
<line x1="452" y1="332" x2="590" y2="332" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="116" y="360" text-anchor="middle" fill="#333">200 OK</text>
<line x1="176" y1="368" x2="62" y2="368" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- CREATE LABEL -->
<rect x="100" y="394" width="480" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text class="ts" x="340" y="404" text-anchor="middle" dominant-baseline="central" fill="#555">Create Label</text>

<text class="ts" x="116" y="432" text-anchor="middle" fill="#333">POST /api/boards/1/labels</text>
<line x1="56" y1="440" x2="176" y2="440" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="468" text-anchor="middle" fill="#333">createLabel(1, name, color)</text>
<line x1="182" y1="476" x2="312" y2="476" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="504" text-anchor="middle" fill="#333">labelRepo.save(new Label)</text>
<line x1="318" y1="512" x2="446" y2="512" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="540" text-anchor="middle" fill="#333">INSERT INTO labels</text>
<line x1="452" y1="548" x2="590" y2="548" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="576" text-anchor="middle" fill="#333">Label (id=1)</text>
<line x1="590" y1="584" x2="458" y2="584" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="116" y="612" text-anchor="middle" fill="#333">201 Created</text>
<line x1="176" y1="620" x2="62" y2="620" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- ATTACH LABEL TO CARD -->
<rect x="100" y="646" width="480" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text class="ts" x="340" y="656" text-anchor="middle" dominant-baseline="central" fill="#555">Attach Label to Card</text>

<text class="ts" x="116" y="684" text-anchor="middle" fill="#333">POST /api/cards/1/labels</text>
<line x1="56" y1="692" x2="176" y2="692" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="720" text-anchor="middle" fill="#333">attachLabel(1, 1)</text>
<line x1="182" y1="728" x2="312" y2="728" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="756" text-anchor="middle" fill="#333">existsByCardAndLabel()</text>
<line x1="318" y1="764" x2="446" y2="764" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="792" text-anchor="middle" fill="#333">SELECT EXISTS(...)</text>
<line x1="452" y1="800" x2="590" y2="800" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="828" text-anchor="middle" fill="#333">false</text>
<line x1="590" y1="836" x2="458" y2="836" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="864" text-anchor="middle" fill="#333">cardLabelRepo.save(CardLabel)</text>
<line x1="318" y1="872" x2="446" y2="872" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="900" text-anchor="middle" fill="#333">INSERT card_labels</text>
<line x1="452" y1="908" x2="590" y2="908" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="116" y="936" text-anchor="middle" fill="#333">200 OK</text>
<line x1="176" y1="944" x2="62" y2="944" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- ERROR FLOW -->
<rect x="100" y="970" width="480" height="20" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="340" y="980" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Error Flow: Duplicate Member</text>

<text class="ts" x="116" y="1008" text-anchor="middle" fill="#333">POST /api/workspaces/1/members</text>
<line x1="56" y1="1016" x2="176" y2="1016" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="1044" text-anchor="middle" fill="#333">addMember(1, 2, MEMBER)</text>
<line x1="182" y1="1052" x2="312" y2="1052" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="1080" text-anchor="middle" fill="#333">existsByWorkspaceAndUser()</text>
<line x1="318" y1="1088" x2="446" y2="1088" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="1116" text-anchor="middle" fill="#333">SELECT EXISTS(...)</text>
<line x1="452" y1="1124" x2="590" y2="1124" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="1152" text-anchor="middle" fill="#A32D2D">true (already a member!)</text>
<line x1="590" y1="1160" x2="458" y2="1160" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="1188" text-anchor="middle" fill="#A32D2D">throws IllegalArgumentException</text>
<line x1="312" y1="1196" x2="188" y2="1196" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="116" y="1224" text-anchor="middle" fill="#A32D2D">500 Internal Server Error</text>
<line x1="176" y1="1232" x2="62" y2="1232" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- ERROR FLOW 2: Not Found -->
<rect x="100" y="1258" width="480" height="20" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="340" y="1268" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Error Flow: Entity Not Found</text>

<text class="ts" x="116" y="1296" text-anchor="middle" fill="#333">GET /api/cards/999</text>
<line x1="56" y1="1304" x2="176" y2="1304" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="248" y="1332" text-anchor="middle" fill="#333">getCardById(999)</text>
<line x1="182" y1="1340" x2="312" y2="1340" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="383" y="1368" text-anchor="middle" fill="#333">cardRepo.findById(999)</text>
<line x1="318" y1="1376" x2="446" y2="1376" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="1404" text-anchor="middle" fill="#333">SELECT FROM cards WHERE id=999</text>
<line x1="452" y1="1412" x2="590" y2="1412" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="522" y="1440" text-anchor="middle" fill="#A32D2D">Empty Optional</text>
<line x1="590" y1="1448" x2="458" y2="1448" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="116" y="1468" text-anchor="middle" fill="#A32D2D">500 Internal Server Error</text>
<line x1="176" y1="1474" x2="62" y2="1474" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
</svg>
</body>
</html>
